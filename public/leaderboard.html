<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdPlay | Global Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Soft Modern Color Palette */
      --bg-body: #f8fafc;
      --bg-panel: #ffffff;
      
      --text-main: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      
      --color-primary: #6366f1; /* Soft Indigo */
      --color-secondary: #ec4899; /* Soft Pink/Rose */
      --color-gold: #f59e0b; /* Warm Amber for Gold/Fastest */
      
      --border-light: #e2e8f0;
      
      /* Plush Shadows */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      
      --font-main: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-main);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Soft Background ───────────────────────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: 
        radial-gradient(at 10% 10%, rgba(99, 102, 241, 0.05) 0, transparent 50%), 
        radial-gradient(at 90% 90%, rgba(236, 72, 153, 0.05) 0, transparent 50%);
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(var(--text-light) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.15;
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 950px;
      margin: 0 auto;
      padding: 60px 20px 80px;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--color-primary); }

    .page-title {
      font-family: var(--font-main);
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .title-crowd { color: var(--color-primary); }
    .title-play  { color: var(--color-secondary); }

    .page-subtitle {
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Stats banner ──────────────────────────────────────────────────────── */
    .stats-banner {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-tile {
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease;
    }
    .stat-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    
    .stat-tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .stat-tile.s-cyan::before  { background: var(--color-primary); }
    .stat-tile.s-pink::before  { background: var(--color-secondary); }
    .stat-tile.s-gold::before  { background: var(--color-gold); }

    .stat-tile .label {
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .stat-tile .value {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
    }
    .v-cyan { color: var(--color-primary); }
    .v-pink { color: var(--color-secondary); }
    .v-gold { color: var(--color-gold); }

    /* ── Filter bar ────────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-bar input {
      flex: 1;
      min-width: 250px;
      background: #ffffff;
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text-main);
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .filter-bar input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .filter-bar input::placeholder { color: var(--text-light); }

    .refresh-btn {
      background: #ffffff;
      border: 1px solid var(--border-light);
      color: var(--text-main);
      border-radius: 10px;
      padding: 12px 24px;
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-btn:hover {
      background: var(--bg-body);
      border-color: #cbd5e1;
    }
    .refresh-btn.spinning { pointer-events: none; opacity: 0.7; }
    
    /* ── Leaderboard table ─────────────────────────────────────────────────── */
    .lb-table-wrap {
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .lb-table-header {
      display: grid;
      grid-template-columns: 60px 1fr 120px 100px 120px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-light);
      background: #f8fafc;
    }

    .lb-col-head {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Rows */
    .lb-row {
      display: grid;
      grid-template-columns: 60px 1fr 120px 100px 120px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-light);
      align-items: center;
      background: #ffffff;
      transition: background 0.2s ease;
      animation: rowIn 0.35s ease both;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: #f1f5f9; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Rank decorators */
    .rank-badge {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
    }
    .rank-1 { font-size: 1.5rem; }
    .rank-2 { font-size: 1.3rem; }
    .rank-3 { font-size: 1.2rem; }
    .rank-n { color: var(--text-light); font-size: 1rem; }

    /* Soft Medal rows */
    .lb-row.gold-row   { background: rgba(245, 158, 11, 0.03); }
    .lb-row.silver-row { background: rgba(148, 163, 184, 0.04); }
    .lb-row.bronze-row { background: rgba(180, 83, 9, 0.03); }

    .player-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text-main);
    }
    .player-meta {
      font-family: var(--font-main);
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .lb-score {
      font-family: var(--font-mono);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--color-primary);
      text-align: right;
    }

    .lb-pieces {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--text-main);
      text-align: right;
    }

    .lb-time {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Empty / loading state ─────────────────────────────────────────────── */
    .lb-empty {
      padding: 80px 20px;
      text-align: center;
      font-family: var(--font-main);
      font-weight: 500;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .lb-empty .icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.5; }

    /* ── Footer ────────────────────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      margin-top: 48px;
      font-family: var(--font-main);
      font-weight: 500;
      font-size: 0.8rem;
      color: var(--text-light);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .lb-table-header,
      .lb-row {
        grid-template-columns: 44px 1fr 90px 70px;
        padding: 16px;
      }
      /* Hide solve-time column on mobile */
      .lb-col-head:nth-child(5),
      .lb-row > .lb-time { display: none; }

      .stats-banner { grid-template-columns: 1fr 1fr; }
      .stat-tile:last-child { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="grid-bg"></div>

  <div class="page">
    <!-- Header -->
    <div class="page-header">
      <a href="/" class="back-link">← Back to Home</a>
      <div class="page-title">
        <span class="title-crowd">Crowd</span><span class="title-play">Play</span>
      </div>
      <div class="page-subtitle">All-Time Global Leaderboard</div>
    </div>

    <!-- Stats banner -->
    <div class="stats-banner" id="statsBanner">
      <div class="stat-tile s-cyan">
        <div class="label">Total Solvers</div>
        <div class="value v-cyan" id="statEntries">—</div>
      </div>
      <div class="stat-tile s-pink">
        <div class="label">Total Points</div>
        <div class="value v-pink" id="statScore">—</div>
      </div>
      <div class="stat-tile s-gold">
        <div class="label">Fastest Solve</div>
        <div class="value v-gold" id="statFastest">—</div>
      </div>
    </div>

    <!-- Filter + refresh -->
    <div class="filter-bar">
      <input type="text" id="filterInput" placeholder="Search by player name…" />
      <button class="refresh-btn" id="refreshBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 8V2h6"/></svg>
        Refresh
      </button>
    </div>

    <!-- Table -->
    <div class="lb-table-wrap">
      <div class="lb-table-header">
        <span class="lb-col-head">#</span>
        <span class="lb-col-head">Player</span>
        <span class="lb-col-head" style="text-align:right">Score</span>
        <span class="lb-col-head" style="text-align:right">Pieces</span>
        <span class="lb-col-head" style="text-align:right">Time</span>
      </div>
      <div id="lbBody">
        <!-- populated by JS -->
        <div class="lb-empty"><div class="icon">⌛</div>Loading records…</div>
      </div>
    </div>

    <div class="page-footer">CrowdPlay · All-Time Hall of Fame · Records persist across sessions</div>
  </div>

  <script>
    let allScores = [];
    let filterQuery = '';

    // ── Helpers ──────────────────────────────────────────────────────────────
    function formatDuration(secs) {
      if (!secs && secs !== 0) return '—';
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: '2-digit' });
    }

    function rankEmoji(n) {
      if (n === 1) return { label: '🥇', cls: 'rank-1' };
      if (n === 2) return { label: '🥈', cls: 'rank-2' };
      if (n === 3) return { label: '🥉', cls: 'rank-3' };
      return { label: `${n}`, cls: 'rank-n' };
    }

    function rowClass(n) {
      if (n === 1) return 'lb-row gold-row';
      if (n === 2) return 'lb-row silver-row';
      if (n === 3) return 'lb-row bronze-row';
      return 'lb-row';
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderRows(scores) {
      const body = document.getElementById('lbBody');
      if (!scores.length) {
        body.innerHTML = `<div class="lb-empty"><div class="icon">🏆</div>No records yet. Be the first to complete a puzzle!</div>`;
        return;
      }

      body.innerHTML = scores.map((s, idx) => {
        const rank = idx + 1;
        const { label, cls } = rankEmoji(rank);
        return `
          <div class="${rowClass(rank)}" style="animation-delay:${idx * 35}ms">
            <span class="rank-badge ${cls}">${label}</span>
            <div>
              <div class="player-name">${escHtml(s.display_name)}</div>
              <div class="player-meta">Room ${escHtml(s.room_code)} · ${s.total_players} players · ${formatDate(s.achieved_at)}</div>
            </div>
            <div class="lb-score">${s.score.toLocaleString()}</div>
            <div class="lb-pieces">${s.pieces_placed}</div>
            <div class="lb-time">${formatDuration(s.solve_duration_secs)}</div>
          </div>`;
      }).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Fetch leaderboard ────────────────────────────────────────────────────
    async function loadScores() {
      const btn = document.getElementById('refreshBtn');
      const svg = btn.querySelector('svg');
      btn.classList.add('spinning');
      if(svg) svg.style.animation = 'spin 1s linear infinite';
      
      try {
        const [lbRes, statsRes] = await Promise.all([
          fetch('/api/leaderboard?limit=50'),
          fetch('/api/leaderboard/stats')
        ]);
        const lbData    = await lbRes.json();
        const statsData = await statsRes.json();

        allScores = lbData.scores || [];
        applyFilter();

        if (statsData.stats) {
          const { totalEntries, totalScore, fastestSolveSecs } = statsData.stats;
          document.getElementById('statEntries').textContent  = totalEntries.toLocaleString();
          document.getElementById('statScore').textContent    = totalScore.toLocaleString();
          document.getElementById('statFastest').textContent  = formatDuration(fastestSolveSecs);
        }
      } catch (err) {
        console.error('Failed to load leaderboard:', err);
        document.getElementById('lbBody').innerHTML =
          `<div class="lb-empty"><div class="icon">⚠️</div>Could not load records. Try refreshing.</div>`;
      } finally {
        btn.classList.remove('spinning');
        if(svg) svg.style.animation = 'none';
      }
    }

    function applyFilter() {
      const q = filterQuery.trim().toLowerCase();
      const filtered = q
        ? allScores.filter(s => s.display_name.toLowerCase().includes(q))
        : allScores;
      renderRows(filtered);
    }

    // ── Events ────────────────────────────────────────────────────────────────
    document.getElementById('filterInput').addEventListener('input', (e) => {
      filterQuery = e.target.value;
      applyFilter();
    });

    document.getElementById('refreshBtn').addEventListener('click', loadScores);

    // Auto-refresh every 30 seconds while the tab is visible
    let autoRefreshTimer = setInterval(() => {
      if (!document.hidden) loadScores();
    }, 30_000);

    // Initial load
    loadScores();
  </script>
</body>
</html>
