<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdPlay | Global Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-darker: #05020f;
      --bg-dark: #0a0520;
      --panel:    rgba(14, 8, 35, 0.85);
      --cyan:  #00f3ff;
      --pink:  #ff007f;
      --gold:  #ffb800;
      --green: #39ff14;
      --purple:#9d4edd;
      --font-title: 'Orbitron', sans-serif;
      --font-main:  'Outfit', sans-serif;
      --font-mono:  'Share Tech Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: #fff;
      font-family: var(--font-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ───────────────────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 15% 10%,  rgba(255, 0, 127, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%,  rgba(0, 243, 255, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%,  rgba(157, 78, 221, 0.06) 0%, transparent 70%);
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .crt-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background:
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
      background-size: 100% 4px, 6px 100%;
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 28px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--cyan); }

    .page-title {
      font-family: var(--font-title);
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1;
      margin-bottom: 10px;
    }
    .title-crowd { color: var(--cyan); text-shadow: 0 0 20px rgba(0,243,255,0.55); }
    .title-play  { color: var(--pink); text-shadow: 0 0 20px rgba(255,0,127,0.55); }

    .page-subtitle {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ── Stats banner ──────────────────────────────────────────────────────── */
    .stats-banner {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-tile {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .stat-tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-tile.s-cyan::before  { background: linear-gradient(90deg, transparent, var(--cyan), transparent); box-shadow: 0 0 12px var(--cyan); }
    .stat-tile.s-pink::before  { background: linear-gradient(90deg, transparent, var(--pink), transparent); box-shadow: 0 0 12px var(--pink); }
    .stat-tile.s-gold::before  { background: linear-gradient(90deg, transparent, var(--gold), transparent); box-shadow: 0 0 12px var(--gold); }

    .stat-tile .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-tile .value {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 900;
    }
    .v-cyan { color: var(--cyan); text-shadow: 0 0 10px rgba(0,243,255,0.5); }
    .v-pink { color: var(--pink); text-shadow: 0 0 10px rgba(255,0,127,0.5); }
    .v-gold { color: var(--gold); text-shadow: 0 0 10px rgba(255,184,0,0.5); }

    /* ── Filter bar ────────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-bar input {
      flex: 1;
      min-width: 180px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 16px;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .filter-bar input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px rgba(0,243,255,0.25);
    }
    .filter-bar input::placeholder { color: rgba(255,255,255,0.25); }

    .refresh-btn {
      background: rgba(0,243,255,0.08);
      border: 1px solid rgba(0,243,255,0.3);
      color: var(--cyan);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .refresh-btn:hover {
      background: rgba(0,243,255,0.18);
      box-shadow: 0 0 12px rgba(0,243,255,0.25);
    }
    .refresh-btn.spinning { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Leaderboard table ─────────────────────────────────────────────────── */
    .lb-table-wrap {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .lb-table-header {
      display: grid;
      grid-template-columns: 56px 1fr 110px 110px 120px;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
    }

    .lb-col-head {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Rows */
    .lb-row {
      display: grid;
      grid-template-columns: 56px 1fr 110px 110px 120px;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      align-items: center;
      transition: background 0.15s;
      animation: rowIn 0.35s ease both;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,0.03); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Rank decorators */
    .rank-badge {
      font-family: var(--font-title);
      font-size: 1rem;
      font-weight: 900;
      text-align: center;
    }
    .rank-1 { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.7); font-size: 1.3rem; }
    .rank-2 { color: #c0c0c0; text-shadow: 0 0 8px rgba(192,192,192,0.5); font-size: 1.15rem; }
    .rank-3 { color: #cd7f32; text-shadow: 0 0 8px rgba(205,127,50,0.5); font-size: 1.05rem; }
    .rank-n { color: rgba(255,255,255,0.35); font-size: 0.85rem; }

    /* Medal rows */
    .lb-row.gold-row   { background: rgba(255,215,0,0.04); }
    .lb-row.silver-row { background: rgba(192,192,192,0.03); }
    .lb-row.bronze-row { background: rgba(205,127,50,0.03); }

    .player-name {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
    }
    .player-meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      margin-top: 3px;
    }

    .lb-score {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 8px rgba(255,184,0,0.4);
      text-align: right;
    }

    .lb-pieces {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--cyan);
      text-align: right;
    }

    .lb-time {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      text-align: right;
    }

    /* ── Empty / loading state ─────────────────────────────────────────────── */
    .lb-empty {
      padding: 60px 20px;
      text-align: center;
      font-family: var(--font-mono);
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      font-size: 0.9rem;
    }
    .lb-empty .icon { font-size: 2.5rem; margin-bottom: 16px; }

    /* ── Skeleton loader ───────────────────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.10) 50%,
        rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 14px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Date badge ────────────────────────────────────────────────────────── */
    .date-badge {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: rgba(255,255,255,0.25);
    }

    /* ── Footer ────────────────────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      margin-top: 48px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .lb-table-header,
      .lb-row {
        grid-template-columns: 44px 1fr 80px 70px;
      }
      /* Hide solve-time column on mobile */
      .lb-col-head:nth-child(5),
      .lb-row > .lb-time { display: none; }

      .stats-banner { grid-template-columns: 1fr 1fr; }
      .stat-tile:last-child { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="grid-bg"></div>
  <div class="crt-overlay"></div>

  <div class="page">
    <!-- Header -->
    <div class="page-header">
      <a href="/" class="back-link">← BACK TO HOME</a>
      <div class="page-title">
        <span class="title-crowd">CROWD</span><span class="title-play">PLAY</span>
      </div>
      <div class="page-subtitle">ALL-TIME GLOBAL LEADERBOARD</div>
    </div>

    <!-- Stats banner -->
    <div class="stats-banner" id="statsBanner">
      <div class="stat-tile s-cyan">
        <div class="label">Total Solvers</div>
        <div class="value v-cyan" id="statEntries">—</div>
      </div>
      <div class="stat-tile s-pink">
        <div class="label">Total Points</div>
        <div class="value v-pink" id="statScore">—</div>
      </div>
      <div class="stat-tile s-gold">
        <div class="label">Fastest Solve</div>
        <div class="value v-gold" id="statFastest">—</div>
      </div>
    </div>

    <!-- Filter + refresh -->
    <div class="filter-bar">
      <input type="text" id="filterInput" placeholder="Search by player name…" />
      <button class="refresh-btn" id="refreshBtn">⟳ REFRESH</button>
    </div>

    <!-- Table -->
    <div class="lb-table-wrap">
      <div class="lb-table-header">
        <span class="lb-col-head">#</span>
        <span class="lb-col-head">PLAYER</span>
        <span class="lb-col-head" style="text-align:right">SCORE</span>
        <span class="lb-col-head" style="text-align:right">PIECES</span>
        <span class="lb-col-head" style="text-align:right">TIME</span>
      </div>
      <div id="lbBody">
        <!-- populated by JS -->
        <div class="lb-empty"><div class="icon">⌛</div>Loading records…</div>
      </div>
    </div>

    <div class="page-footer">CROWDPLAY · ALL-TIME HALL OF FAME · RECORDS PERSIST ACROSS SESSIONS</div>
  </div>

  <script>
    let allScores = [];
    let filterQuery = '';

    // ── Helpers ──────────────────────────────────────────────────────────────
    function formatDuration(secs) {
      if (!secs && secs !== 0) return '—';
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: '2-digit' });
    }

    function rankEmoji(n) {
      if (n === 1) return { label: '🥇', cls: 'rank-1' };
      if (n === 2) return { label: '🥈', cls: 'rank-2' };
      if (n === 3) return { label: '🥉', cls: 'rank-3' };
      return { label: `${n}`, cls: 'rank-n' };
    }

    function rowClass(n) {
      if (n === 1) return 'lb-row gold-row';
      if (n === 2) return 'lb-row silver-row';
      if (n === 3) return 'lb-row bronze-row';
      return 'lb-row';
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderRows(scores) {
      const body = document.getElementById('lbBody');
      if (!scores.length) {
        body.innerHTML = `<div class="lb-empty"><div class="icon">🏆</div>No records yet. Be the first to complete a puzzle!</div>`;
        return;
      }

      body.innerHTML = scores.map((s, idx) => {
        const rank = idx + 1;
        const { label, cls } = rankEmoji(rank);
        return `
          <div class="${rowClass(rank)}" style="animation-delay:${idx * 35}ms">
            <span class="rank-badge ${cls}">${label}</span>
            <div>
              <div class="player-name">${escHtml(s.display_name)}</div>
              <div class="player-meta">ROOM ${escHtml(s.room_code)} · ${s.total_players} players · ${formatDate(s.achieved_at)}</div>
            </div>
            <div class="lb-score">${s.score.toLocaleString()}</div>
            <div class="lb-pieces">${s.pieces_placed}</div>
            <div class="lb-time">${formatDuration(s.solve_duration_secs)}</div>
          </div>`;
      }).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Fetch leaderboard ────────────────────────────────────────────────────
    async function loadScores() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');
      try {
        const [lbRes, statsRes] = await Promise.all([
          fetch('/api/leaderboard?limit=50'),
          fetch('/api/leaderboard/stats')
        ]);
        const lbData    = await lbRes.json();
        const statsData = await statsRes.json();

        allScores = lbData.scores || [];
        applyFilter();

        if (statsData.stats) {
          const { totalEntries, totalScore, fastestSolveSecs } = statsData.stats;
          document.getElementById('statEntries').textContent  = totalEntries.toLocaleString();
          document.getElementById('statScore').textContent    = totalScore.toLocaleString();
          document.getElementById('statFastest').textContent  = formatDuration(fastestSolveSecs);
        }
      } catch (err) {
        console.error('Failed to load leaderboard:', err);
        document.getElementById('lbBody').innerHTML =
          `<div class="lb-empty"><div class="icon">⚠️</div>Could not load records. Try refreshing.</div>`;
      } finally {
        btn.classList.remove('spinning');
      }
    }

    function applyFilter() {
      const q = filterQuery.trim().toLowerCase();
      const filtered = q
        ? allScores.filter(s => s.display_name.toLowerCase().includes(q))
        : allScores;
      renderRows(filtered);
    }

    // ── Events ────────────────────────────────────────────────────────────────
    document.getElementById('filterInput').addEventListener('input', (e) => {
      filterQuery = e.target.value;
      applyFilter();
    });

    document.getElementById('refreshBtn').addEventListener('click', loadScores);

    // Auto-refresh every 30 seconds while the tab is visible
    let autoRefreshTimer = setInterval(() => {
      if (!document.hidden) loadScores();
    }, 30_000);

    // Initial load
    loadScores();
  </script>
</body>
</html>
