<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrowdPlay | Interactive Event Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Soft Modern Color Palette */
      --bg-body: #f8fafc;
      --bg-panel: #ffffff;
      
      --text-main: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      
      --color-primary: #6366f1; /* Soft Indigo */
      --color-primary-hover: #4f46e5;
      
      --color-secondary: #ec4899; /* Soft Pink/Rose */
      --color-secondary-hover: #db2777;
      
      --color-accent: #8b5cf6; /* Soft Purple */
      
      --border-light: #e2e8f0;
      
      /* Plush Shadows */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      
      --font-main: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Soft Animated Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: 
        radial-gradient(at 10% 10%, rgba(99, 102, 241, 0.06) 0, transparent 50%), 
        radial-gradient(at 90% 90%, rgba(236, 72, 153, 0.06) 0, transparent 50%);
    }
    
    /* Clean Dot Pattern */
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(var(--text-light) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.15;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-panel);
      border-radius: 24px;
      border: 1px solid #ffffff;
      box-shadow: var(--shadow-lg);
      padding: 56px 48px 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      animation: floatIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes floatIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Accent top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-accent));
    }

    /* ── Logo ── */
    .logo {
      font-family: var(--font-main);
      font-size: clamp(2.5rem, 8vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
      display: flex;
      justify-content: center;
    }
    
    .logo .crowd { color: var(--color-primary); }
    .logo .play  { color: var(--color-secondary); }

    .tagline {
      font-family: var(--font-main);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ── Description ── */
    .desc {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* ── Buttons ── */
    .btn-group { display: flex; flex-direction: column; gap: 14px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 12px;
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { 
      background: var(--color-primary-hover); 
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text-main);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }
    .btn-secondary:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .btn-outline:hover {
      color: var(--color-secondary);
      background: #fdf2f8; /* Very light pink */
    }

    .btn-icon { font-size: 1.2rem; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 8px 0;
      color: var(--text-light);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    /* ── Version badge ── */
    .version {
      margin-top: 32px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-bg"></div>

  <div class="card">
    <div class="logo"><span class="crowd">Crowd</span><span class="play">Play</span></div>
    <div class="tagline">Interactive Event Platform</div>

    <p class="desc">
      Real-time collaborative puzzle games designed for events, malls, and conferences.
      Teams solve together — big screen, mobile controllers.
    </p>

    <div class="btn-group">
      <a href="/admin" class="btn btn-primary">
        <span class="btn-icon">⚙️</span>
        Admin Panel
      </a>
      <a href="/screen/DEMO" class="btn btn-secondary">
        <span class="btn-icon">🖥️</span>
        Big Screen Display
      </a>
      <div class="divider">Or</div>
      <a href="/leaderboard" class="btn btn-outline">
        <span class="btn-icon">🏆</span>
        Global Leaderboard
      </a>
    </div>

    <div class="version">CROWDPLAY v2.0 · LEADERBOARD EDITION</div>
  </div>
</body>
</html>
